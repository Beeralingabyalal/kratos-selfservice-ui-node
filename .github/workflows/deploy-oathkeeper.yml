name: Deploy Oathkeeper

on:
  push:
    paths:
      - "infra/oathkeeper/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy Oathkeeper
        run: |
          helm upgrade --install oathkeeper ory/oathkeeper \
          -n oathkeeper \
          -f infra/oathkeeper/values.yaml

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/oathkeeper -n oathkeeper

      - name: Smoke test
        run: |
          kubectl port-forward -n oathkeeper svc/oathkeeper-api 4456:4456 &
          sleep 10
          curl -f http://localhost:4456/health/ready