name: Deploy Oathkeeper

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy Oathkeeper
        run: |
          helm upgrade --install oathkeeper ./infra/charts/oathkeeper

      - name: Health Check
        run: |
          curl -f http://<your-domain>:4456/health/ready

      - name: Rollback on Failure
        if: failure()
        run: |
          helm rollback oathkeeper