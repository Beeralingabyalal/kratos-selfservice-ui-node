name: Oathkeeper Validation

on:
  push:
    paths:
      - "infra/oathkeeper/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Validate access rules JSON
        run: |
          jq . infra/oathkeeper/access-rules.json

      - name: Validate rules folder
        run: |
          ls infra/oathkeeper
          ls infra/oathkeeper/rules

      - name: Check Oathkeeper config
        run: |
          cat infra/oathkeeper/oathkeeper.yml