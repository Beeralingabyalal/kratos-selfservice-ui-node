name: Validate Oathkeeper Setup

on:
push:
branches:
- main

jobs:
validate:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Validate rules JSON
    run: |
      jq . infra/charts/oathkeeper/rules/tenant-isolation.json

  - name: Lint Helm chart
    run: |
      helm lint infra/charts/oathkeeper

