version: v1.1.0

dsn: postgres://kratos:secret@postgres:5432/kratos?sslmode=disable

log:
  level: debug
  format: json

serve:
  public:
    base_url: http://localhost:4433/
  admin:
    base_url: http://localhost:4434/

courier:
  delivery_strategy: smtp
  smtp:
    connection_uri: smtp://mailhog:1025/?skip_ssl_verify=true&disable_starttls=true

identity:
  default_schema_id: scansure_v1
  schemas:
    - id: default 
      url: file:///etc/config/kratos/identity.schema.scansure.json

    - id: scansure_v1
      url: file:///etc/config/kratos/identity.schema.scansure.json

selfservice:
  default_browser_return_url: http://localhost:3000/
  allowed_return_urls:
    - http://localhost:3000
    - http://localhost:3001

  methods:
   password:
    enabled: true

  flows:
    error:
      ui_url: http://localhost:3000/error

    login:
      ui_url: http://localhost:3000/login
      lifespan: 1h
      after:
        password:
          hooks:
            - hook: require_verified_address

    registration:
      ui_url: http://localhost:3000/registration
      lifespan: 1h

    settings:
      ui_url: http://localhost:3000/settings
      lifespan: 1h
      privileged_session_max_age: 1h

    recovery:
      ui_url: http://localhost:3000/recovery
      lifespan: 1h
      enabled: true

    verification:
      ui_url: http://localhost:3000/verification
      lifespan: 1h
      enabled: true

secrets:
  cookie:
    - "please-change-this-secret"

hashers:
  argon2:
    memory: 64MB
    iterations: 2
    parallelism: 1
    salt_length: 16
    key_length: 32
