apiVersion: v1
kind: ConfigMap
metadata:
  name: otlp-config
  namespace: default
data:
  collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
          grpc:

    exporters:
      debug:
        verbosity: detailed

    service:
      pipelines:
        logs:
          receivers: [otlp]
          exporters: [debug]