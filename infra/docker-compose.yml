  #     audit-postgres:
  #         condition: service_started

  oathkeeper:
    image: oryd/oathkeeper:v0.40.6
    container_name: oathkeeper
    ports:
      - "4455:4455"
      - "4456:4456"
    volumes:
      - ./oathkeeper/oathkeeper.yml:/etc/oathkeeper/config.yml
      - ./oathkeeper/access-rules.json:/etc/access-rules.json
      # - ./infra/charts/oathkeeper/templates/rules:/etc/rules
    command: ["serve", "-c", "/etc/oathkeeper/config.yml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kratos
      - hydra
      - keto
      # - ai-gateway
      # - dicom-deid
      # - model-registry
      # - schema-registry
      # - review-service

  authz-adapter:
    build: ./authz-adapter
    container_name: authz_adapter
    ports:
      - "3101:3001"
    environment:
      - KETO_READ_URL=http://keto:4466
    depends_on:
      - keto

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    container_name: envoy
    ports:
      - "8082:8080"
    volumes:
      - ./infra/envoy/envoy.yml:/etc/envoy/envoy.yml:ro
      - ./certs:/etc/certs:ro
    extra_hosts:
     - "host.docker.internal:host-gateway"
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      - kratos
      - hydra

