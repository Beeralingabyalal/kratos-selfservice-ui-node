version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: kratos_postgres
    environment:
      POSTGRES_USER: kratos
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: kratos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kratos"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  hydra-postgres:
    image: postgres:15
    container_name: hydra_postgres
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hydra
    ports:
      - "5434:5432"
    volumes:
      - hydra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  audit-postgres:
    image: postgres:16
    container_name: audit_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audit
    ports:
      - "5435:5432"
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
      # - ../ai-services/audit-worker/db-init:/docker-entrypoint-initdb.d
    

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  keto-migrate:
    image: oryd/keto:v0.11.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keto/keto.yml:/etc/config/keto.yml
    command: migrate up -y -c /etc/config/keto.yml

  keto:
    image: oryd/keto:v0.11.0
    container_name: keto
    command: serve --config /etc/config/keto.yml
    ports:
      - "4466:4466"   # read API
      - "4467:4467"   # admin API
    volumes:
      - ./keto/keto.yml:/etc/config/keto.yml
    depends_on:
      keto-migrate:
        condition: service_completed_successfully

  keto-bootstrap:
    build: ./keto/bootstrap
    container_name: keto_bootstrap
    environment:
      - KETO_ADMIN_URL=http://keto:4467
    ports:
      - "4000:4000"
    depends_on:
      - keto

  kratos-migrate:
    image: oryd/kratos:v1.1.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DSN=postgres://kratos:secret@postgres:5432/kratos?sslmode=disable
    command: migrate sql -e --yes

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    depends_on:
      hydra-postgres:
        condition: service_healthy
    environment:
      - DSN=postgres://hydra:secret@hydra-postgres:5432/hydra?sslmode=disable
    command: migrate sql -e --yes

  kratos:
    image: oryd/kratos:v1.1.0
    container_name: kratos
    depends_on:
      - kratos-migrate
      - mailhog
    environment:
      - DSN=postgres://kratos:secret@postgres:5432/kratos?sslmode=disable
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./kratos/kratos.yml:/etc/config/kratos/kratos.yml
      - ./kratos/identity.schema.scansure.json:/etc/config/kratos/identity.schema.scansure.json
    command: serve --dev --watch-courier --config /etc/config/kratos/kratos.yml

  hydra:
    image: oryd/hydra:v2.2.0
    container_name: hydra
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    environment:
      - DSN=postgres://hydra:secret@hydra-postgres:5432/hydra?sslmode=disable
      - URLS_SELF_ISSUER=http://hydra:4444/
      - URLS_SELF_PUBLIC=http://localhost:4444/
      - URLS_CONSENT=http://localhost:3000/consent
      - URLS_LOGIN=http://localhost:3000/login
      - URLS_LOGOUT=http://localhost:3000/logout
      - URLS_IDENTITY_PROVIDER_PUBLIC_URL=http://kratos:4433/
      - SECRETS_SYSTEM=change-me-to-a-long-random-hydra-secret
      - LOG_LEVEL=debug
      - LOG_LEAK_SENSITIVE_VALUES=true
      - SERVE_PUBLIC_CORS_ENABLED=true
      - STRATEGIES_ACCESS_TOKEN=jwt
    ports:
      - "4444:4444"
      - "4445:4445"
    command: serve all --dev
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ai-gateway:
  #   build:
