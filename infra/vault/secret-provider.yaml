apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-secrets
  namespace: authz
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.vault.svc.cluster.local:8200"
    roleName: "scansure-role"

    objects: |
      - objectName: "kratos-admin-token"
        secretPath: "secret/data/kratos"
        secretKey: "admin_token"

      - objectName: "keto-admin-token"
        secretPath: "secret/data/keto"
        secretKey: "admin_token"