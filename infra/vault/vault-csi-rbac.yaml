apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-csi-token-creator
rules:
- apiGroups: [""]
  resources:
    - serviceaccounts/token
  verbs:
    - create

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-csi-token-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-csi-token-creator
subjects:
- kind: ServiceAccount
  name: default
  namespace: kube-system