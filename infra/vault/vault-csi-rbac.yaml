apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-csi-token-creator
rules:
# ✅ token creation
- apiGroups: [""]
  resources:
    - serviceaccounts/token
  verbs:
    - create

# ✅ FULL secrets access (THIS IS THE FINAL FIX)
- apiGroups: [""]
  resources:
    - secrets
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-csi-token-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-csi-token-creator
subjects:
- kind: ServiceAccount
  name: secrets-store-csi-driver
  namespace: kube-system